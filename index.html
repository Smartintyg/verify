<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Verifiera Smartintyg</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f5f7f9;
  margin:0;
  padding:40px 20px;
  color:#1f2937;
}
.container{max-width:760px;margin:auto}
.card{
  background:#fff;
  border-radius:12px;
  padding:30px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05)
}

.header{
  display:flex;
  align-items:center;
  gap:15px;
}

.title{
  font-size:22px;
  margin:0;
}

.subtitle{
  margin-top:6px;
  font-size:13px;
  color:#2563eb;
  font-weight:600;
}

.info{
  margin-top:12px;
  font-size:13px;
  color:#6b7280;
  line-height:1.5;
}

.result{
  margin-top:20px;
  font-weight:600;
  font-size:16px;
}

.human{
  margin-top:20px;
  display:none;
  line-height:1.7;
}

.notice{
  margin-top:15px;
  padding:12px;
  background:#fff3cd;
  border-radius:8px;
  display:none;
}

.input{
  margin-top:20px;
}

textarea{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #ddd;
  font-family:monospace;
}

button{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:#fff;
  cursor:pointer;
}

.lang{
  position:absolute;
  top:20px;
  right:20px;
  cursor:pointer;
  border:1px solid #ddd;
  padding:6px 10px;
  border-radius:8px;
  background:#fff;
}

.hidden{display:none!important}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
</head>

<body>
<div class="container">
<div class="card">

<div class="lang" onclick="toggleLang()">🌍 <span id="langLabel"></span></div>

<div class="header">
<img src="https://raw.githubusercontent.com/Smartintyg/verify/refs/heads/main/Badge.svg" style="height:60px;">
<div>
<div id="title" class="title"></div>
<div id="subtitle" class="subtitle"></div>
</div>
</div>

<div id="info" class="info"></div>

<div id="manualSection" class="input">
<div id="instruction"></div>
<textarea id="input"></textarea>
<button onclick="manualVerify()" id="verifyBtn"></button>
</div>

<div id="result" class="result"></div>
<div id="notice" class="notice"></div>

<div id="human" class="human">
<div><b id="tName"></b> <span id="name"></span></div>
<div><b id="tCourse"></b> <span id="course"></span></div>
<div><b id="tDate"></b> <span id="date"></span></div>
<div id="orgRow" style="display:none;"><b id="tOrg"></b> <span id="org"></span></div>
</div>

</div>
</div>

<script>
const API_URL="https://apgrfymchppbokshvkai.supabase.co/functions/v1/verify-certificate";
const APIKEY="DIN_API_KEY_HÄR";
const PUBLIC_KEY="MCowBQYDK2VwAyEAPCxYBQ91z4NMHBU3cUW6P+DFCKQRfal/tcEqyAeXstk=";

const translations={
sv:{
title:"Verifiera kursintyg",
subtitle:"Extern verifiering via Smartintyg",
info:"Detta är en extern och oberoende verifiering. Intyget verifieras kryptografiskt och är inte beroende av att Smartintyg är tillgängligt.",
instruction:"Klistra in kod (SI-XXXX) eller JSON.",
btn:"Verifiera",
valid:"✅ Intyget är giltigt",
invalid:"❌ Ogiltig signatur",
nodata:"❌ Ingen verifieringsdata",
offline:"⚠️ Smartintyg kunde inte nås. Intyget kan fortfarande vara giltigt.",
name:"Namn:",
course:"Kurs:",
date:"Datum:",
org:"Utfärdare:"
},
en:{
title:"Verify certificate",
subtitle:"External verification via Smartintyg",
info:"This is an external independent verification. The certificate is cryptographically verified and does not depend on Smartintyg being available.",
instruction:"Paste code or JSON.",
btn:"Verify",
valid:"✅ Certificate is valid",
invalid:"❌ Invalid signature",
nodata:"❌ No verification data",
offline:"⚠️ Could not reach Smartintyg. Certificate may still be valid.",
name:"Name:",
course:"Course:",
date:"Date:",
org:"Issuer:"
}
};

let lang = translations[navigator.language?.slice(0,2)] ? navigator.language.slice(0,2) : "en";

function applyLang(){
const t=translations[lang];
title.innerText=t.title;
subtitle.innerText=t.subtitle;
info.innerText=t.info;
instruction.innerText=t.instruction;
verifyBtn.innerText=t.btn;
tName.innerText=t.name;
tCourse.innerText=t.course;
tDate.innerText=t.date;
tOrg.innerText=t.org;
langLabel.innerText=lang.toUpperCase();
}

function toggleLang(){
lang = lang==="sv" ? "en" : "sv";
applyLang();
}

function showNotice(text){
notice.style.display="block";
notice.innerText=text;
}

function showHuman(data){
const nameVal=data.participant_name || "";
const courseVal=data.course_title || data.course_name || "";
const dateVal=data.certificate_date || data.issued_date || "";
const orgVal=data.org_name || data.issuer_name || "";

if(!nameVal && !courseVal && !dateVal) return;

human.style.display="block";

name.innerText=nameVal;
course.innerText=courseVal;
date.innerText=dateVal ? new Date(dateVal).toLocaleDateString(lang) : "";

if(orgVal){
orgRow.style.display="block";
org.innerText=orgVal;
}
}

async function verifySignature(hash,signature){
const pk=Uint8Array.from(atob(PUBLIC_KEY),c=>c.charCodeAt(0));
const sig=Uint8Array.from(atob(signature),c=>c.charCodeAt(0));
const key=await crypto.subtle.importKey("spki",pk,{name:"Ed25519"},false,["verify"]);
return crypto.subtle.verify("Ed25519",key,sig,new TextEncoder().encode(hash));
}

async function fetchCertificate(code){
try{
const res=await fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"application/json","apikey":APIKEY},
body:JSON.stringify({code})
});
const data=await res.json();
return data.found?data:null;
}catch{return null;}
}

function getData(){
const p=new URLSearchParams(location.search);

if(p.get("data")){
try{return JSON.parse(atob(p.get("data")));}catch{}
}

if(p.get("d")){
try{
const bytes=Uint8Array.from(atob(p.get("d")),c=>c.charCodeAt(0));
const str=pako.inflate(bytes,{to:"string"});
const [hash,signature]=str.split(".");
return {certificate_hash:hash,certificate_signature:signature};
}catch{}
}

return null;
}

async function init(){
applyLang();

const params=new URLSearchParams(location.search);
const code=params.get("code");
const data=getData();

if(code || data){
manualSection.classList.add("hidden");
}

if(code){
const res=await fetchCertificate(code);
if(!res){showNotice(translations[lang].offline);return;}
const ok=await verifySignature(res.certificate_hash,res.certificate_signature);
result.innerText=ok?translations[lang].valid:translations[lang].invalid;
showHuman(res);
return;
}

if(data){
const ok=await verifySignature(data.certificate_hash,data.certificate_signature);
result.innerText=ok?translations[lang].valid:translations[lang].invalid;
showHuman(data);
}
}

function manualVerify(){
location.href="?code="+input.value.trim();
}

init();
</script>

</body>
</html>
