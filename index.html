<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Verifiera Smartintyg</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f3f4f6;margin:0;padding:30px;color:#1f2937}
.container{max-width:760px;margin:auto}
.card{background:#fff;border-radius:16px;padding:28px;box-shadow:0 12px 30px rgba(0,0,0,0.08)}
.header{display:flex;align-items:center;gap:14px}
.title{font-size:22px;font-weight:700}
.subtitle{font-size:13px;color:#2563eb;font-weight:600}
.status{margin-top:20px;padding:14px;border-radius:10px;font-weight:600}
.ok{background:#ecfdf5;color:#065f46}
.error{background:#fef2f2;color:#7f1d1d}
.details{margin-top:20px;display:none}
textarea{width:100%;margin-top:10px;padding:10px}
button{margin-top:10px;padding:10px;background:#2563eb;color:#fff;border:none;border-radius:8px}
.lang{position:absolute;top:15px;right:15px;cursor:pointer}
.menu{display:none;position:absolute;background:#fff;border:1px solid #ddd}
.menu div{padding:8px;cursor:pointer}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
</head>

<body>
<div class="lang" onclick="toggleLang()">🌍 <span id="langLabel"></span></div>
<div id="menu" class="menu"></div>

<div class="container">
<div class="card">

<div class="header">
<img src="https://raw.githubusercontent.com/Smartintyg/verify/refs/heads/main/Badge.svg" style="height:50px;">
<div>
<div id="title" class="title"></div>
<div id="subtitle" class="subtitle"></div>
</div>
</div>

<div id="statusBox" class="status"></div>

<div id="details" class="details">
<div><b id="tName"></b> <span id="name"></span></div>
<div><b id="tCourse"></b> <span id="course"></span></div>
<div><b id="tDate"></b> <span id="date"></span></div>
</div>

<div id="manual">
<textarea id="input"></textarea>
<button onclick="manualVerify()" id="btn"></button>
</div>

</div>
</div>

<script>
const API_URL="https://apgrfymchppbokshvkai.supabase.co/functions/v1/verify-certificate";
const APIKEY="DIN_API_KEY_HÄR";
const PUBLIC_KEY="MCowBQYDK2VwAyEAPCxYBQ91z4NMHBU3cUW6P+DFCKQRfal/tcEqyAeXstk=";

const translations={
sv:{title:"Verifiera",btn:"Verifiera",name:"Namn:",course:"Kurs:",date:"Datum:"},
en:{title:"Verify",btn:"Verify",name:"Name:",course:"Course:",date:"Date:"},
de:{title:"Prüfen",btn:"Prüfen",name:"Name:",course:"Kurs:",date:"Datum:"},
fr:{title:"Vérifier",btn:"Vérifier",name:"Nom:",course:"Cours:",date:"Date:"},
es:{title:"Verificar",btn:"Verificar",name:"Nombre:",course:"Curso:",date:"Fecha:"},
it:{title:"Verifica",btn:"Verifica",name:"Nome:",course:"Corso:",date:"Data:"},
nl:{title:"Verifieer",btn:"Verifieer",name:"Naam:",course:"Cursus:",date:"Datum:"},
nb:{title:"Verifiser",btn:"Verifiser",name:"Navn:",course:"Kurs:",date:"Dato:"},
da:{title:"Verificer",btn:"Verificer",name:"Navn:",course:"Kursus:",date:"Dato:"},
fi:{title:"Vahvista",btn:"Vahvista",name:"Nimi:",course:"Kurssi:",date:"Päivä:"},
pl:{title:"Zweryfikuj",btn:"Weryfikuj",name:"Imię:",course:"Kurs:",date:"Data:"},
pt:{title:"Verificar",btn:"Verificar",name:"Nome:",course:"Curso:",date:"Data:"}
};

let lang="sv";

function applyLang(){
const t=translations[lang];
title.innerText=t.title;
btn.innerText=t.btn;
tName.innerText=t.name;
tCourse.innerText=t.course;
tDate.innerText=t.date;
langLabel.innerText=lang.toUpperCase();
}

function toggleLang(){
menu.style.display=menu.style.display==="block"?"none":"block";
}

function buildMenu(){
Object.keys(translations).forEach(l=>{
const d=document.createElement("div");
d.innerText=l.toUpperCase();
d.onclick=()=>{lang=l;applyLang();menu.style.display="none";}
menu.appendChild(d);
});
}

function normalize(d){
return {
name:d.participant_name||d.participantName||"",
course:d.course_title||d.course_name||d.courseName||"",
date:d.certificate_date||d.issued_date||d.issuedDate||""
};
}

function showDetails(d){
const n=normalize(d);
details.style.display="block";
name.innerText=n.name;
course.innerText=n.course;
date.innerText=n.date;
}

async function verifySignature(hash,signature){
const pk=Uint8Array.from(atob(PUBLIC_KEY),c=>c.charCodeAt(0));
const sig=Uint8Array.from(atob(signature),c=>c.charCodeAt(0));
const key=await crypto.subtle.importKey("spki",pk,{name:"Ed25519"},false,["verify"]);
return crypto.subtle.verify("Ed25519",key,sig,new TextEncoder().encode(hash));
}

async function fetchCertificate(code){
try{
const res=await fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"application/json","apikey":APIKEY},
body:JSON.stringify({code})
});
const data=await res.json();
return data.found?data:null;
}catch{return null;}
}

function getData(){
const p=new URLSearchParams(location.search);
if(p.get("data")){
return JSON.parse(atob(p.get("data")));
}
return null;
}

async function init(){
applyLang();
buildMenu();

const p=new URLSearchParams(location.search);
const code=p.get("code");
const data=getData();

if(code){
const res=await fetchCertificate(code);
showDetails(res);
return;
}

if(data){
showDetails(data);
}
}

function manualVerify(){
location.href="?code="+input.value;
}

init();
</script>
</body>
</html>
