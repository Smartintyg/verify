<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Verifiera Smartintyg</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f7f9;margin:0;padding:40px 20px;color:#1f2937}
.container{max-width:760px;margin:auto}
.card{background:white;border-radius:12px;padding:30px;box-shadow:0 10px 25px rgba(0,0,0,0.05)}
.header{display:flex;align-items:center;gap:15px}
.lang{position:absolute;top:20px;right:20px;cursor:pointer}
.result{margin-top:20px;font-weight:600}
.human-info{display:none;margin-top:20px}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
</head>

<body>
<div class="container">
<div class="card">

<div class="lang" onclick="toggleLang()">🌍</div>

<div class="header">
<img src="https://raw.githubusercontent.com/Smartintyg/verify/refs/heads/main/Badge.svg" style="height:60px;">
<div>
<h1 id="title">Verifiera kursintyg</h1>
</div>
</div>

<div id="info">Verifiering sker lokalt i din webbläsare.</div>

<div id="result" class="result"></div>

<div id="humanInfo" class="human-info">
<div><b id="labelName">Namn:</b> <span id="name"></span></div>
<div><b id="labelCourse">Kurs:</b> <span id="course"></span></div>
<div><b id="labelDate">Datum:</b> <span id="date"></span></div>
</div>

</div>
</div>

<script>
const API = "https://apgrfymchppbokshvkai.supabase.co/functions/v1/verify-certificate";
const APIKEY = "DIN_ANON_KEY_HÄR";

let lang = "sv";

const t = {
sv:{valid:"✅ Intyget är giltigt",fail:"❌ Ogiltig signatur",apiFail:"⚠️ Kunde inte hämta data från Smartintyg. Detta betyder inte att intyget är ogiltigt. Verifiering kan fortfarande göras via signaturen.",name:"Namn:",course:"Kurs:",date:"Datum:"},
en:{valid:"✅ Certificate is valid",fail:"❌ Invalid signature",apiFail:"⚠️ Could not fetch data from Smartintyg. This does NOT mean the certificate is invalid.",name:"Name:",course:"Course:",date:"Date:"}
};

function setLang(l){
lang=l;
document.getElementById("labelName").innerText=t[l].name;
document.getElementById("labelCourse").innerText=t[l].course;
document.getElementById("labelDate").innerText=t[l].date;
}

function toggleLang(){
lang = lang==="sv" ? "en" : "sv";
setLang(lang);
}

function formatDate(d){return d?new Date(d).toLocaleDateString():"";}

function getCompressed(){
const p=new URLSearchParams(location.search);
const d=p.get("d");
if(!d) return null;

try{
const bytes=Uint8Array.from(atob(d),c=>c.charCodeAt(0));
const str=pako.inflate(bytes,{to:"string"});
const [hash,signature]=str.split(".");
return {certificate_hash:hash,certificate_signature:signature};
}catch{return null;}
}

async function fetchAPI(code){
try{
const r=await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json",
"apikey":APIKEY
},
body:JSON.stringify({code})
});
if(!r.ok) return null;
const d=await r.json();
if(!d.found) return null;
return d;
}catch{return null;}
}

async function verifySig(hash,signature){
const pk=Uint8Array.from(atob("MCowBQYDK2VwAyEAPCxYBQ91z4NMHBU3cUW6P+DFCKQRfal/tcEqyAeXstk="),c=>c.charCodeAt(0));
const sig=Uint8Array.from(atob(signature),c=>c.charCodeAt(0));

const key=await crypto.subtle.importKey("spki",pk,{name:"Ed25519"},false,["verify"]);
return await crypto.subtle.verify("Ed25519",key,sig,new TextEncoder().encode(hash));
}

async function init(){

const params=new URLSearchParams(location.search);
const code=params.get("code");

let data=null;
let hash=null;
let signature=null;

const compressed=getCompressed();

if(compressed){
hash=compressed.certificate_hash;
signature=compressed.certificate_signature;
}

if(code){
data=await fetchAPI(code);
if(data){
hash=data.certificate_hash;
signature=data.certificate_signature;
}
else{
document.getElementById("result").innerText=t[lang].apiFail;
}
}

if(hash && signature){
const ok=await verifySig(hash,signature);

document.getElementById("result").innerText= ok ? t[lang].valid : t[lang].fail;

if(data){
document.getElementById("humanInfo").style.display="block";
document.getElementById("name").innerText=data.participant_name;
document.getElementById("course").innerText=data.course_title;
document.getElementById("date").innerText=formatDate(data.certificate_date);
}
}
}

setLang("sv");
init();
</script>

</body>
</html>
