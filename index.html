const languages = Object.keys(translations);
let lang = (navigator.language || "sv").slice(0,2);
if(!translations[lang]) lang = "en";

function applyLang(){
  const t = translations[lang];
  document.getElementById("title").innerText = t.title;
  document.getElementById("subtitle").innerText = t.subtitle;
  document.getElementById("info").innerText = t.info;
  document.getElementById("instruction").innerText = t.instruction;
  document.getElementById("verifyBtn").innerText = t.btn;
  document.getElementById("tName").innerText = t.name;
  document.getElementById("tCourse").innerText = t.course;
  document.getElementById("tDate").innerText = t.date;
  document.getElementById("tOrg").innerText = t.org;
  document.getElementById("langLabel").innerText = translations[lang].label;
}

function buildMenu(){
  const menu = document.getElementById("menu");
  menu.innerHTML = "";
  languages.forEach(code=>{
    const d = document.createElement("div");
    d.innerText = translations[code].label;
    d.onclick = ()=>{
      lang = code;
      applyLang();
      menu.style.display = "none";
    };
    menu.appendChild(d);
  });
}

function toggleLang(){
  const menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

document.addEventListener("click",(e)=>{
  const wrap = document.querySelector(".lang-wrap");
  if(wrap && !wrap.contains(e.target)){
    document.getElementById("menu").style.display = "none";
  }
});

function setStatus(ok){
  const box = document.getElementById("statusBox");
  box.className = "status " + (ok ? "ok" : "error");
  box.innerText = ok ? translations[lang].valid : translations[lang].invalid;
}

function showNotice(text){
  const notice = document.getElementById("notice");
  notice.style.display = "block";
  notice.innerText = text;
}

function clearNotice(){
  const notice = document.getElementById("notice");
  notice.style.display = "none";
  notice.innerText = "";
}

function showDetails(d){
  const details = document.getElementById("details");
  const nameVal = d.participant_name || d.participantName || "";
  const courseVal = d.course_title || d.course_name || d.courseName || "";
  const dateVal = d.certificate_date || d.issued_date || d.issuedDate || "";
  const orgVal = d.org_name || d.issuer_name || "";

  details.style.display = "block";
  document.getElementById("name").innerText = nameVal || "-";
  document.getElementById("course").innerText = courseVal || "-";
  document.getElementById("date").innerText = dateVal ? new Date(dateVal).toLocaleDateString(lang) : "-";

  if(orgVal){
    document.getElementById("orgRow").style.display = "block";
    document.getElementById("org").innerText = orgVal;
  } else {
    document.getElementById("orgRow").style.display = "none";
    document.getElementById("org").innerText = "";
  }
}

async function verifySignature(hash, signature){
  const pk = Uint8Array.from(atob(PUBLIC_KEY), c => c.charCodeAt(0));
  const sig = Uint8Array.from(atob(signature), c => c.charCodeAt(0));
  const key = await crypto.subtle.importKey("spki", pk, {name:"Ed25519"}, false, ["verify"]);
  return crypto.subtle.verify("Ed25519", key, sig, new TextEncoder().encode(hash));
}

async function fetchCertificate(code){
  try{
    const res = await fetch(API_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "apikey":APIKEY
      },
      body:JSON.stringify({code})
    });
    const data = await res.json();
    return data && data.found ? data : null;
  }catch{
    return null;
  }
}

function getLegacyData(){
  const p = new URLSearchParams(location.search);
  const data = p.get("data");
  if(!data) return null;
  try{
    return JSON.parse(atob(data));
  }catch{
    return null;
  }
}

function getCompressedData(){
  const p = new URLSearchParams(location.search);
  const d = p.get("d");
  if(!d) return null;
  try{
    const bytes = Uint8Array.from(atob(d), c => c.charCodeAt(0));
    const str = pako.inflate(bytes, {to:"string"});
    const [hash, signature] = str.split(".");
    if(!hash || !signature) return null;
    return {certificate_hash:hash, certificate_signature:signature};
  }catch{
    return null;
  }
}

async function verifyJsonObject(obj){
  if(!obj || !obj.certificate_hash || !obj.certificate_signature){
    setStatus(false);
    document.getElementById("statusBox").innerText = translations[lang].nodata;
    return;
  }
  const ok = await verifySignature(obj.certificate_hash, obj.certificate_signature);
  setStatus(ok);
  showDetails(obj);
}

async function runCodeVerification(code){
  clearNotice();
  const data = await fetchCertificate(code);
  if(!data){
    showNotice(translations[lang].offline);
    return;
  }
  const ok = await verifySignature(data.certificate_hash, data.certificate_signature);
  setStatus(ok);
  showDetails(data);
}

async function manualVerify(){
  const val = document.getElementById("input").value.trim();
  if(!val){
    setStatus(false);
    document.getElementById("statusBox").innerText = translations[lang].nodata;
    return;
  }

  if(val.startsWith("SI-")){
    await runCodeVerification(val);
    return;
  }

  try{
    const parsed = JSON.parse(val);
    await verifyJsonObject(parsed);
  }catch{
    setStatus(false);
    document.getElementById("statusBox").innerText = translations[lang].nodata;
  }
}

async function init(){
  applyLang();
  buildMenu();

  const p = new URLSearchParams(location.search);
  const code = p.get("code");
  const legacy = getLegacyData();
  const compressed = getCompressedData();

  if(code || legacy || compressed){
    document.getElementById("manualSection").classList.add("hidden");
  }

  if(code){
    await runCodeVerification(code);
    return;
  }

  if(legacy){
    await verifyJsonObject(legacy);
    return;
  }

  if(compressed){
    await verifyJsonObject(compressed);
    return;
  }
}

init();
</script>
