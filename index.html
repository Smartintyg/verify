<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Verifiera Smartintyg</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f7f9;
      margin: 0;
      padding: 40px 20px;
      color: #1f2937;
    }

    .container {
      max-width: 700px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 20px;
      margin: 0;
    }

    .subtitle {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 25px;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-family: monospace;
      font-size: 13px;
    }

    button {
      margin-top: 15px;
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .result {
      margin-top: 20px;
      font-weight: 600;
      font-size: 16px;
    }

    .hash-box {
      margin-top: 15px;
      padding: 10px;
      background: #f3f4f6;
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      word-break: break-all;
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      color: #6b7280;
    }

    .external {
      margin-top: 10px;
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="header">
      <img src="badge.svg" style="height:60px;">
      <div>
        <h1>Verifiera kursintyg</h1>
        <div style="font-size:13px; color:#6b7280;">
          Smartintyg – extern verifiering
        </div>
      </div>
    </div>

    <div class="subtitle">
      Detta är en fristående verifiering av Smartintyg.  
      Verifiering sker lokalt i din webbläsare.
    </div>

    <textarea id="data" rows="10" placeholder="Klistra in intygsdata (JSON)..."></textarea>

    <button onclick="verify()">Verifiera</button>

    <div class="result" id="result"></div>

    <div id="hashContainer" style="display:none;">
      <p><b>Verifieringsnyckel</b></p>
      <div id="hash" class="hash-box"></div>
      <button onclick="copyHash()">Kopiera</button>
    </div>

    <div class="footer">
      ✔ Oberoende verifiering  
      ✔ Ingen koppling till server  
      ✔ Kryptografiskt säker
    </div>

    <div class="external">
      Detta är en extern verifieringssida (GitHub Pages)
    </div>

  </div>
</div>

<script>
const publicKeyBase64 = "MCowBQYDK2VwAyEAPCxYBQ91z4NMHBU3cUW6P+DFCKQRfal/tcEqyAeXstk=";

function getDataFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const data = params.get("data");
  if (!data) return null;
  try {
    return JSON.parse(atob(data));
  } catch {
    return null;
  }
}

async function verify(inputOverride = null) {
  let parsed;

  if (inputOverride) {
    parsed = inputOverride;
  } else {
    const input = document.getElementById("data").value;
    if (!input) {
      document.getElementById("result").innerText = "Ingen data angiven";
      return;
    }
    parsed = JSON.parse(input);
  }

  const encoder = new TextEncoder();
  const canonical = JSON.stringify({
    certificate_id: parsed.certificate_id,
    verification_code: parsed.verification_code,
    participant_name: parsed.participant_name,
    course_name: parsed.course_name,
    issued_date: parsed.issued_date
  });

  const hashBuffer = await crypto.subtle.digest("SHA-256", encoder.encode(canonical));
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hashHex = hashArray.map(b => b.toString(16).padStart(2, "0")).join("");

  if (hashHex !== parsed.certificate_hash) {
    document.getElementById("result").innerText = "❌ Hash stämmer inte";
    return;
  }

  const signature = Uint8Array.from(atob(parsed.certificate_signature), c => c.charCodeAt(0));
  const publicKeyBytes = Uint8Array.from(atob(publicKeyBase64), c => c.charCodeAt(0));

  const key = await crypto.subtle.importKey(
    "spki",
    publicKeyBytes,
    { name: "Ed25519" },
    false,
    ["verify"]
  );

  const isValid = await crypto.subtle.verify(
    { name: "Ed25519" },
    key,
    signature,
    encoder.encode(parsed.certificate_hash)
  );

  if (isValid) {
    document.getElementById("result").innerText = "✅ Intyget är giltigt";
    document.getElementById("hashContainer").style.display = "block";
    document.getElementById("hash").innerText = parsed.certificate_hash;
  } else {
    document.getElementById("result").innerText = "❌ Ogiltig signatur";
  }
}

function copyHash() {
  const text = document.getElementById("hash").innerText;
  navigator.clipboard.writeText(text);
  alert("Kopierad!");
}

/* AUTO-VERIFY om data finns i URL */
const urlData = getDataFromUrl();
if (urlData) {
  verify(urlData);
}
</script>

</body>
</html>
